[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# The real URL is loaded dynamically from settings in env.py.
# This placeholder prevents alembic from erroring on ini parse.
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/preanalysis

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
